<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wemos IoT Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/justgage/1.6.1/justgage.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            width: 350px;
        }
        #gauge {
            width: 280px;
            height: 220px;
            margin: 0 auto;
        }
        
        /* Style Tombol Switch Bulat */
        .btn-switch {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 8px solid #eee;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            outline: none;
        }
        .btn-off {
            background-color: #95a5a6;
            border-color: #bdc3c7;
        }
        .btn-on {
            background-color: #2ecc71;
            border-color: #27ae60;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }
        .btn-switch:active {
            transform: scale(0.92);
        }

        #status {
            font-size: 0.8em;
            margin-top: 25px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #666;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #333; margin-bottom: 5px;">Wemos Monitor</h2>
    <div id="gauge"></div>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">
    
    <h4 style="margin-bottom: 15px; color: #555;">Control Switch</h4>
    <button id="mainBtn" class="btn-switch btn-off">OFF</button>
    
    <div id="status">Menghubungkan ke Firebase...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- KONFIGURASI FIREBASE ANDA ---
    const firebaseConfig = {
      apiKey: "AIzaSyAqWK1lHjgUFst4QXQ_KRDO5zpTv_1Wq94",
      authDomain: "test-1da07.firebaseapp.com",
      databaseURL: "https://test-1da07-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "test-1da07",
      storageBucket: "test-1da07.firebasestorage.app",
      messagingSenderId: "1069901232096",
      appId: "1:1069901232096:web:b7439b0a6402e4fdd35d85"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const mainBtn = document.getElementById("mainBtn");
    const statusEl = document.getElementById("status");
    
    let currentState = false; 

    // 1. Inisialisasi Gauge
    let myGauge = new JustGage({
        id: "gauge", value: 0, min: 0, max: 100,
        title: "Sensor Data", label: "Value",
        levelColors: ["#3498db", "#f1c40f", "#e74c3c"]
    });

    // 2. Monitoring Real-time dengan Logika Pengunci Waktu (LocalStorage)
    onValue(ref(db, 'test/angka_acak'), (snapshot) => {
        const data = snapshot.val();
        
        if (data !== null) {
            myGauge.refresh(data);
            
            // Ambil data angka dan jam terakhir yang tersimpan di browser
            const lastSavedData = localStorage.getItem("last_wemos_val");
            const lastSavedTime = localStorage.getItem("last_wemos_time");

            // Jika angka BERUBAH dari sebelumnya, update jamnya
            if (data.toString() !== lastSavedData) {
                const currentTime = new Date().toLocaleTimeString();
                
                // Simpan ke memori browser agar saat refresh tidak hilang
                localStorage.setItem("last_wemos_val", data);
                localStorage.setItem("last_wemos_time", currentTime);
                
                statusEl.innerText = "Monitoring Aktif - " + currentTime;
            } else {
                // Jika angka SAMA (saat refresh & Wemos mati), gunakan jam lama
                statusEl.innerText = "Monitoring Aktif - " + (lastSavedTime || new Date().toLocaleTimeString());
            }
            
            statusEl.style.color = "#27ae60";
        }
    });

    // 3. Sinkronisasi Tombol Switch
    onValue(ref(db, 'test/button_state'), (snapshot) => {
        const state = snapshot.val();
        if (state !== null) {
            currentState = state;
            if (state) {
                mainBtn.innerText = "ON";
                mainBtn.className = "btn-switch btn-on";
            } else {
                mainBtn.innerText = "OFF";
                mainBtn.className = "btn-switch btn-off";
            }
        }
    });

    // 4. Aksi Klik Tombol (Kirim status ke Firebase)
    mainBtn.addEventListener('click', () => {
        const newState = !currentState; 
        set(ref(db, 'test/button_state'), newState);
    });

</script>

</body>
</html>

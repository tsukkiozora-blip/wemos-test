<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Control</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/justgage/1.6.1/justgage.min.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; /* Biru Gelap Profesional */
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 25px; 
            padding: 40px;
            margin: 0;
        }
        .card { 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 310px; 
            position: relative;
            overflow: hidden;
            border-top: 8px solid #334155;
        }
        /* Aksen Warna NATO */
        .card-alpha { border-top-color: #3b82f6; }   /* Biru */
        .card-bravo { border-top-color: #f59e0b; }  /* Oranye */
        .card-charlie { border-top-color: #8b5cf6; } /* Ungu */

        .card h3 { color: #1e293b; margin: 10px 0 15px 0; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; }
        .gauge-div { width: 280px; height: 200px; margin: 0 auto; }
        
        .btn-switch { 
            width: 85px; height: 85px; border-radius: 50%; border: 6px solid #f1f5f9; 
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s; 
            margin-top: 15px; outline: none; font-size: 0.9rem;
        }
        .btn-off { background-color: #94a3b8; color: #f8fafc; }
        .btn-on { 
            background-color: #10b981; 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); 
            border-color: #d1fae5;
        }
        .btn-switch:active { transform: scale(0.9); }
        
        .status-box { 
            font-size: 0.8em; margin-top: 20px; padding: 10px; 
            background: #f8fafc; border-radius: 12px; color: #64748b; 
            border: 1px solid #e2e8f0; font-weight: 500;
        }
    </style>
</head>
<body>

<div class="card card-alpha">
    <h3>ALPHA</h3>
    <div id="gauge_alpha" class="gauge-div"></div>
    <button id="btn_alpha" class="btn-switch btn-off">OFF</button>
    <div id="status_alpha" class="status-box">Menghubungkan...</div>
</div>

<div class="card card-bravo">
    <h3>BRAVO</h3>
    <div id="gauge_bravo" class="gauge-div"></div>
    <button id="btn_bravo" class="btn-switch btn-off">OFF</button>
    <div id="status_bravo" class="status-box">Menghubungkan...</div>
</div>

<div class="card card-charlie">
    <h3>CHARLIE</h3>
    <div id="gauge_charlie" class="gauge-div"></div>
    <button id="btn_charlie" class="btn-switch btn-off">OFF</button>
    <div id="status_charlie" class="status-box">Menghubungkan...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAqWK1lHjgUFst4QXQ_KRDO5zpTv_1Wq94",
      authDomain: "test-1da07.firebaseapp.com",
      databaseURL: "https://test-1da07-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "test-1da07",
      storageBucket: "test-1da07.firebasestorage.app",
      messagingSenderId: "1069901232096",
      appId: "1:1069901232096:web:b7439b0a6402e4fdd35d85"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function createUnit(name) {
        const lowerName = name.toLowerCase();
        
        const gauge = new JustGage({
            id: "gauge_" + lowerName,
            value: 0, min: 0, max: 100,
            title: "Node " + name,
            label: "Data",
            levelColors: ["#3b82f6", "#f59e0b", "#ef4444"]
        });

        const btn = document.getElementById("btn_" + lowerName);
        const status = document.getElementById("status_" + lowerName);
        let currentBtnState = false;

        onValue(ref(db, `test/${lowerName}/angka_acak`), (snapshot) => {
            const val = snapshot.val();
            if (val !== null) {
                gauge.refresh(val);
                const lastVal = localStorage.getItem("v_" + lowerName);
                const lastTime = localStorage.getItem("t_" + lowerName);

                if (val.toString() !== lastVal) {
                    const now = new Date().toLocaleTimeString();
                    localStorage.setItem("v_" + lowerName, val);
                    localStorage.setItem("t_" + lowerName, now);
                    status.innerText = "Active: " + now;
                } else {
                    status.innerText = "Active: " + (lastTime || "---");
                }
            }
        });

        onValue(ref(db, `test/${lowerName}/button_state`), (snapshot) => {
            currentBtnState = snapshot.val() || false;
            btn.innerText = currentBtnState ? "ON" : "OFF";
            btn.className = `btn-switch ${currentBtnState ? 'btn-on' : 'btn-off'}`;
        });

        btn.onclick = () => set(ref(db, `test/${lowerName}/button_state`), !currentBtnState);
    }

    createUnit("ALPHA");
    createUnit("BRAVO");
    createUnit("CHARLIE");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Control & Monitoring</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/justgage/1.6.1/justgage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            padding: 20px;
            margin: 0;
            color: white;
        }
        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 300px; 
            border-top: 8px solid #334155;
        }
        .card-alpha { border-top-color: #3b82f6; }   
        .card-bravo { border-top-color: #f59e0b; }  
        .card-charlie { border-top-color: #8b5cf6; } 

        .card h3 { color: #1e293b; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        .gauge-div { width: 100%; height: 180px; }
        
        .btn-switch { 
            width: 70px; height: 70px; border-radius: 50%; border: 5px solid #f1f5f9; 
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-off { background-color: #94a3b8; color: white; }
        .btn-on { background-color: #10b981; color: white; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        .status-box { 
            font-size: 0.75em; margin-top: 15px; padding: 8px; 
            background: #f8fafc; border-radius: 10px; color: #64748b; 
        }

        /* Styling Grafik */
        .chart-container {
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            margin: 0 auto 20px auto;
            max-width: 1000px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .chart-container h4 { color: #1e293b; margin-top: 0; text-align: center; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="card card-alpha">
        <h3>ALPHA</h3>
        <div id="gauge_alpha" class="gauge-div"></div>
        <button id="btn_alpha" class="btn-switch btn-off">OFF</button>
        <div id="status_alpha" class="status-box">Menghubungkan...</div>
    </div>

    <div class="card card-bravo">
        <h3>BRAVO</h3>
        <div id="gauge_bravo" class="gauge-div"></div>
        <button id="btn_bravo" class="btn-switch btn-off">OFF</button>
        <div id="status_bravo" class="status-box">Menghubungkan...</div>
    </div>

    <div class="card card-charlie">
        <h3>CHARLIE</h3>
        <div id="gauge_charlie" class="gauge-div"></div>
        <button id="btn_charlie" class="btn-switch btn-off">OFF</button>
        <div id="status_charlie" class="status-box">Menghubungkan...</div>
    </div>
</div>

<div class="chart-container">
    <h4>Monitoring Data Real-time</h4>
    <canvas id="dataChart"></canvas>
</div>

<div class="chart-container">
    <h4>Status Tombol (ON/OFF)</h4>
    <canvas id="buttonChart"></canvas>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAqWK1lHjgUFst4QXQ_KRDO5zpTv_1Wq94",
      authDomain: "test-1da07.firebaseapp.com",
      databaseURL: "https://test-1da07-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "test-1da07",
      storageBucket: "test-1da07.firebasestorage.app",
      messagingSenderId: "1069901232096",
      appId: "1:1069901232096:web:b7439b0a6402e4fdd35d85"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Konfigurasi Grafik Data
    const ctxData = document.getElementById('dataChart').getContext('2d');
    const dataChart = new Chart(ctxData, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Alpha', borderColor: '#3b82f6', data: [], tension: 0.3 },
                { label: 'Bravo', borderColor: '#f59e0b', data: [], tension: 0.3 },
                { label: 'Charlie', borderColor: '#8b5cf6', data: [], tension: 0.3 }
            ]
        },
        options: { responsive: true, scales: { y: { min: 0, max: 100 } } }
    });

    // Konfigurasi Grafik Tombol
    const ctxBtn = document.getElementById('buttonChart').getContext('2d');
    const buttonChart = new Chart(ctxBtn, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Btn Alpha', borderColor: '#3b82f6', data: [], stepped: true },
                { label: 'Btn Bravo', borderColor: '#f59e0b', data: [], stepped: true },
                { label: 'Btn Charlie', borderColor: '#8b5cf6', data: [], stepped: true }
            ]
        },
        options: { responsive: true, scales: { y: { min: -0.1, max: 1.1, ticks: { stepSize: 1 } } } }
    });

    function updateCharts(label, unitIndex, value, chartObj) {
        if (chartObj.data.labels.length > 20) {
            chartObj.data.labels.shift();
            chartObj.data.datasets.forEach(ds => ds.data.shift());
        }
        if (unitIndex === 0) chartObj.data.labels.push(label);
        chartObj.data.datasets[unitIndex].data.push(value);
        chartObj.update('none'); // Update tanpa animasi berat agar enteng
    }

    function createUnit(name, index) {
        const lowerName = name.toLowerCase();
        const gauge = new JustGage({
            id: "gauge_" + lowerName,
            value: 0, min: 0, max: 100,
            title: "Unit " + name,
            label: "Value",
            levelColors: ["#3b82f6", "#f59e0b", "#ef4444"]
        });

        const btn = document.getElementById("btn_" + lowerName);
        const status = document.getElementById("status_" + lowerName);
        let currentStatusNumber = 0;

        // Listen Data Angka Acak
        onValue(ref(db, `test/${lowerName}/angka_acak`), (snapshot) => {
            const val = snapshot.val();
            if (val !== null) {
                gauge.refresh(val);
                const now = new Date().toLocaleTimeString();
                status.innerText = "Active: " + now;
                updateCharts(now, index, val, dataChart);
            }
        });

        // Listen Status Tombol
        onValue(ref(db, `test/${lowerName}/device_status`), (snapshot) => {
            currentStatusNumber = snapshot.val() === 1 ? 1 : 0;
            btn.innerText = currentStatusNumber === 1 ? "ON" : "OFF";
            btn.className = `btn-switch ${currentStatusNumber === 1 ? 'btn-on' : 'btn-off'}`;
            
            const now = new Date().toLocaleTimeString();
            updateCharts(now, index, currentStatusNumber, buttonChart);
        });

        btn.onclick = () => {
            const nextValue = currentStatusNumber === 1 ? 0 : 1;
            set(ref(db, `test/${lowerName}/device_status`), nextValue);
        };
    }

    createUnit("ALPHA", 0);
    createUnit("BRAVO", 1);
    createUnit("CHARLIE", 2);
</script>
</body>
</html>
